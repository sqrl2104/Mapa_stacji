const KOLORY = {

let markery = [];

const map = L.map('map', {

function lokalizujMnie() {
    navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.marker([lat, lon], {
            icon: L.divIcon({
                className: '',
                html: '<div style="width:14px;height:14px;background:#1F3864;border:3px solid white;border-radius:50%;box-shadow:0 0 6px rgba(0,0,0,0.4)"></div>',
                iconAnchor: [7, 7]
            })
        }).addTo(map).bindPopup("📍 Twoja lokalizacja").openPopup();
        map.setView([lat, lon], 8);
    }, () => alert("Nie udało się pobrać lokalizacji. Sprawdź uprawnienia GPS."));
}

function nawigujDoStacji(destLat, destLon) {
    navigator.geolocation.getCurrentPosition(pos => {
        const startLat = pos.coords.latitude;
        const startLon = pos.coords.longitude;
        if (routingControl) map.removeControl(routingControl);
        routingControl = L.Routing.control({
            plan: L.Routing.plan([L.latLng(startLat, startLon), L.latLng(destLat, destLon)], {
                addWaypoints: false,
                draggableWaypoints: false,
                createMarker: function(i, wp) {
                    return L.marker(wp.latLng, {
                        draggable: false,
                        icon: L.divIcon({
                            className: '',
                            html: i === 0
                              ? '<div style="width:14px;height:14px;background:#1F3864;border:3px solid white;border-radius:50%;box-shadow:0 0 6px rgba(0,0,0,0.4)"></div>'
                              : '<div style="width:16px;height:16px;background:#E53935;border:3px solid white;border-radius:3px;box-shadow:0 0 6px rgba(0,0,0,0.4)"></div>',
                            iconAnchor: [7, 7]
                        })
                    });
                }
            }),
            routeWhileDragging: false,
            language: 'pl',
            lineOptions: { addWaypoints: false, styles: [{ color: '#2E75B6', weight: 4 }] }
        }).addTo(map);
        map.closePopup();
    }, () => alert("Nie udało się pobrać lokalizacji GPS."));
}

STACJE.forEach(s => {
    const kolor = KOLORY[s.dostawca] || "#888";

    markerOpts.bindPopup(`

    markerOpts.addTo(map);

    // Dla filtrów: stacje ze zniżką reagują na filtr "ZNIZKA"
    // Stacje które mają zniżkę I są np. AS24 — reagują na OBA filtry
    markerOpts._dostawca = s.dostawca;
    markerOpts._znizka = s.znizka;
    markery.push(markerOpts);
});

function aktualizujMarkery() {
    markery.forEach(m => {
        // Pokaż marker jeśli:
        // - jego dostawca jest aktywny LUB
        // - ma zniżkę i filtr ZNIZKA jest aktywny
        const dostawcaAktywny = aktywne.has(m._dostawca);
        const znizkaAktywna   = m._znizka && aktywne.has("ZNIZKA");

        if (dostawcaAktywny || znizkaAktywna) {
            map.addLayer(m);
        } else {
            map.removeLayer(m);
        }
    });
}

document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        const d = btn.dataset.d;
        if (aktywne.has(d)) {
            aktywne.delete(d);
            btn.classList.remove("active");
        } else {
            aktywne.add(d);
            btn.classList.add("active");
        }
        aktualizujMarkery();
    });
});
function szukajAdresu() {
    const q = document.getElementById('dest-input').value.trim();
    if (!q) { alert('Wpisz adres docelowy'); return; }

    fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(q))
      .then(r => r.json())
      .then(data => {
          if (!data.length) { alert('Nie znaleziono adresu: ' + q); return; }
          const destLat = parseFloat(data[0].lat);
          const destLon = parseFloat(data[0].lon);

          navigator.geolocation.getCurrentPosition(pos => {
              const startLat = pos.coords.latitude;
              const startLon = pos.coords.longitude;
              if (routingControl) map.removeControl(routingControl);
              routingControl = L.Routing.control({
                  plan: L.Routing.plan([L.latLng(startLat, startLon), L.latLng(destLat, destLon)], {
                      addWaypoints: false,
                      draggableWaypoints: false,
                      createMarker: function(i, wp) {
                          return L.marker(wp.latLng, {
                              draggable: false,
                              icon: L.divIcon({
                                  className: '',
                                  html: i === 0
                                    ? '<div style="width:14px;height:14px;background:#1F3864;border:3px solid white;border-radius:50%;box-shadow:0 0 6px rgba(0,0,0,0.4)"></div>'
                                    : '<div style="width:16px;height:16px;background:#E53935;border:3px solid white;border-radius:3px;box-shadow:0 0 6px rgba(0,0,0,0.4)"></div>',
                                  iconAnchor: [7, 7]
                              })
                          });
                      }
                  }),
                  routeWhileDragging: false,
                  language: 'pl',
                  lineOptions: { addWaypoints: false, styles: [{ color: '#2E75B6', weight: 4 }] }
              }).addTo(map);
          }, () => {
              map.setView([destLat, destLon], 10);
              L.marker([destLat, destLon]).addTo(map).bindPopup(q).openPopup();
          });
      })
      .catch(() => alert('Błąd wyszukiwania adresu'));
}

document.getElementById('dest-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') szukajAdresu();
});
function najtanszaWPoblizu() {
    navigator.geolocation.getCurrentPosition(pos => {
        const myLat = pos.coords.latitude;
        const myLon = pos.coords.longitude;
        const promienKm = 50;

        function dystansKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        let best = null;
        let bestDist = Infinity;
        STACJE.forEach(s => {
            if (!s.diesel) return;
            const d = dystansKm(myLat, myLon, s.lat, s.lon);
            if (d <= promienKm && (best === null || s.diesel < best.diesel || (s.diesel === best.diesel && d < bestDist))) {
                best = s;
                bestDist = d;
            }
        });

        if (!best) {
            alert('Brak stacji z ceną diesla w promieniu ' + promienKm + ' km.');
            return;
        }

        map.setView([best.lat, best.lon], 12);

        // Znajdź marker i otwórz popup
        markery.forEach(m => {
            if (m.getLatLng().lat === best.lat && m.getLatLng().lng === best.lon) {
                m.openPopup();
            }
        });

        // Pokaż też lokalizację użytkownika
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.marker([myLat, myLon], {
            icon: L.divIcon({
                className: '',
                html: '<div style="width:14px;height:14px;background:#1F3864;border:3px solid white;border-radius:50%;box-shadow:0 0 6px rgba(0,0,0,0.4)"></div>',
                iconAnchor: [7, 7]
            })
        }).addTo(map);

        

    }, () => alert("Nie udało się pobrać lokalizacji GPS."));
}
let tracking = false;
let trackingId = null;

function toggleTracking() {
    const btn = document.getElementById('btn-track');
    if (tracking) {
        // Wyłącz
        tracking = false;
        btn.classList.remove('active');
        btn.textContent = '📍 Śledź pozycję';
        if (trackingId) navigator.geolocation.clearWatch(trackingId);
        trackingId = null;
    } else {
        // Włącz
        tracking = true;
        btn.classList.add('active');
        btn.textContent = '⏹ Zatrzymaj śledzenie';
        trackingId = navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            if (userMarker) {
                userMarker.setLatLng([lat, lon]);
            } else {
                userMarker = L.marker([lat, lon], {
                    icon: L.divIcon({
                        className: '',
                        html: '<div style="width:14px;height:14px;background:#1F3864;border:3px solid white;border-radius:50%;box-shadow:0 0 6px rgba(0,0,0,0.4)"></div>',
                        iconAnchor: [7, 7]
                    })
                }).addTo(map);
            }
            map.setView([lat, lon], Math.max(map.getZoom(), 10));
        }, () => {
            alert("Nie udało się pobrać lokalizacji GPS.");
            toggleTracking();
        }, {
            enableHighAccuracy: true,
            maximumAge: 5000,
            timeout: 10000
        });
    }
}
map.on('click', function(e) {
    if (routingControl) {
        const dominated_waypoints = routingControl.getWaypoints();
        if (dominated_waypoints.length > 2) {
            routingControl.spliceWaypoints(1, dominated_waypoints.length - 2);
        }
    }
});
</script>
